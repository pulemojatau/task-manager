spring:
  application:
    name: task-manager-api

  datasource:
    url: jdbc:postgresql://localhost:5432/taskdb
    username: postgres
    password: yourpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8085